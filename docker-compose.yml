services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VUE_CLI_HOST=0.0.0.0
    command: ["npm", "run", "serve"]
    depends_on:
      - backend_go
      - backend_rust  # Added dependency on the Rust backend

  backend_go:
    build:
      context: ./backend_go
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/my_db
    depends_on:
      - db

  backend_rust:
    build:
      context: ./backend_rust
    ports:
      - "4000:4000"  # Exposing Rust GraphQL API
    # environment:
    #   - DATABASE_URL=postgres://user:password@db:5432/my_db
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=my_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
